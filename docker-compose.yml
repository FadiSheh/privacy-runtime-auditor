version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pra_postgres
    environment:
      POSTGRES_USER: pra_user
      POSTGRES_PASSWORD: pra_password
      POSTGRES_DB: pra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pra_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pra_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: pra_api
    environment:
      - DATABASE_URL=postgresql://pra_user:pra_password@postgres:5432/pra_db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - API_PORT=3001
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - /app/node_modules

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: pra_worker
    environment:
      - DATABASE_URL=postgresql://pra_user:pra_password@postgres:5432/pra_db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - WORKER_CONCURRENCY=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker:/app
      - /app/node_modules
      - ./data/uploads:/app/data/uploads

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: pra_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
      - NODE_ENV=development
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
