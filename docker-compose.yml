services:
  postgres:
    image: postgres:16-alpine
    container_name: pra_postgres
    environment:
      POSTGRES_USER: pra_user
      POSTGRES_PASSWORD: pra_password
      POSTGRES_DB: pra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pra_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pra_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: pra_api
    environment:
      - DATABASE_URL=postgresql://pra_user:pra_password@postgres:5432/pra_db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - API_PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: pra_worker
    environment:
      - DATABASE_URL=postgresql://pra_user:pra_password@postgres:5432/pra_db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - WORKER_CONCURRENCY=2
      - STORAGE_PATH=/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/data/uploads:Z

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
    container_name: pra_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
